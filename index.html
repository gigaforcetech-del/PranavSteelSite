<!DOCTYPE html>
<html lang="mr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>जनसेवा प्रोफाइल्स</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Noto Sans Devanagari', sans-serif;
    }

    body {
      background: #eef1f5;
      color: #1d2b44;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    .topbar {
      width: 100%;
      min-height: 86px;
      background: #fff;
      border-bottom: 1px solid #e1e5ea;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 70px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .brand-icon {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      background: #ef4444;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 20px;
      box-shadow: 0 4px 12px rgba(239, 68, 68, 0.25);
      flex-shrink: 0;
    }

    .brand h2 {
      font-size: 20px;
      font-weight: 800;
      color: #16233b;
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 18px;
    }

    .gear {
      font-size: 24px;
      color: #64748b;
      cursor: pointer;
    }

    .start-btn {
      background: #ef4444;
      color: #fff;
      padding: 13px 28px;
      border-radius: 999px;
      font-weight: 700;
      box-shadow: 0 10px 25px rgba(239, 68, 68, 0.25);
      transition: 0.3s ease;
      display: inline-block;
    }

    .start-btn:hover {
      transform: translateY(-2px);
    }

    .hero {
      text-align: center;
      padding: 60px 20px 30px;
    }

    .hero h1 {
      font-size: 48px;
      font-weight: 800;
      color: #0f172a;
      margin-bottom: 14px;
    }

    .hero p {
      max-width: 760px;
      margin: 0 auto;
      font-size: 20px;
      line-height: 1.7;
      color: #475569;
    }

    .controls {
      max-width: 1240px;
      margin: 10px auto 30px;
      padding: 0 20px;
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .search-box,
    .filter-box {
      background: #fff;
      border: 1px solid #dbe2ea;
      border-radius: 14px;
      padding: 14px 16px;
      min-width: 260px;
      font-size: 16px;
      color: #334155;
      outline: none;
    }

    .search-box {
      width: 340px;
    }

    .cards-wrap {
      max-width: 1240px;
      margin: 0 auto 80px;
      padding: 0 20px;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 32px;
    }

    .profile-card {
      background: #fff;
      border: 1px solid #dbe2ea;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(15, 23, 42, 0.03);
      position: relative;
      transition: 0.25s ease;
    }

    .profile-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 10px 25px rgba(15, 23, 42, 0.08);
    }

    .card-top {
      height: 120px;
      background: linear-gradient(135deg, #f59e0b, #ef4444);
      position: relative;
    }

    .avatar {
      position: absolute;
      left: 24px;
      bottom: -34px;
      width: 88px;
      height: 88px;
      border-radius: 50%;
      background: #fff;
      padding: 5px;
      box-shadow: 0 8px 18px rgba(0,0,0,0.08);
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
      display: block;
    }

    .card-body {
      padding: 56px 24px 22px;
      position: relative;
      min-height: 270px;
    }

    .verify {
      position: absolute;
      top: 52px;
      right: 24px;
      width: 28px;
      height: 28px;
      background: #3b82f6;
      border-radius: 50%;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: bold;
    }

    .name {
      font-size: 30px;
      font-weight: 800;
      color: #16233b;
      margin-bottom: 8px;
      line-height: 1.2;
    }

    .designation {
      font-size: 18px;
      color: #64748b;
      margin-bottom: 16px;
      font-weight: 500;
    }

    .party {
      display: inline-block;
      margin-bottom: 14px;
      padding: 7px 12px;
      border-radius: 999px;
      background: #f1f5f9;
      color: #334155;
      font-size: 14px;
      font-weight: 700;
    }

    .desc {
      font-size: 17px;
      line-height: 1.7;
      color: #334155;
      margin-bottom: 18px;
    }

    .tags {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .tag {
      background: #eef2f7;
      color: #475569;
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 500;
    }

    .card-footer {
      border-top: 1px solid #e8edf3;
      text-align: center;
      padding: 20px;
    }

    .card-footer a {
      color: #ef4444;
      font-weight: 700;
      font-size: 18px;
    }

    .empty-message {
      max-width: 700px;
      margin: 40px auto 80px;
      background: #fff;
      border: 1px solid #dbe2ea;
      border-radius: 18px;
      padding: 26px;
      text-align: center;
      color: #64748b;
      font-size: 18px;
      display: none;
    }

    .footer {
      border-top: 1px solid #dbe2ea;
      background: #f7f9fc;
      padding: 22px 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: #64748b;
      font-size: 16px;
      flex-wrap: wrap;
      gap: 14px;
    }

    .footer-left {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      color: #334155;
    }

    .footer-icons {
      display: flex;
      gap: 18px;
      font-size: 24px;
      color: #94a3b8;
    }

    @media (max-width: 992px) {
      .hero h1 {
        font-size: 38px;
      }

      .hero p {
        font-size: 18px;
      }

      .cards-wrap {
        grid-template-columns: 1fr;
      }

      .topbar {
        padding: 16px 20px;
      }
    }

    @media (max-width: 600px) {
      .topbar {
        flex-direction: column;
        align-items: flex-start;
        gap: 14px;
      }

      .topbar-right {
        width: 100%;
        justify-content: space-between;
      }

      .hero {
        padding-top: 40px;
      }

      .hero h1 {
        font-size: 30px;
      }

      .hero p {
        font-size: 16px;
      }

      .name {
        font-size: 24px;
      }

      .designation {
        font-size: 16px;
      }

      .desc {
        font-size: 15px;
      }

      .search-box,
      .filter-box {
        width: 100%;
        min-width: unset;
      }

      .footer {
        padding: 18px;
        flex-direction: column;
        text-align: center;
      }
    }
  </style>
</head>
<body>

  <header class="topbar">
    <div class="brand">
      <div class="brand-icon">🏛</div>
      <h2>जनसेवा प्रोफाइल्स</h2>
    </div>

    <div class="topbar-right">
      <div class="gear">⚙</div>
      <a href="#" class="start-btn">सुरू करा</a>
    </div>
  </header>

  <section class="hero">
    <h1>डेमो प्रोफाइल्स पहा</h1>
    <p>
      आगामी आमदार पारदर्शकता राखण्यासाठी जनसेवा प्रोफाइल्स कसे वापरत आहेत ते पहा.
      ही चाचणी उदाहरणासाठी तयार केलेली डेमो प्रोफाइल्स आहेत.
    </p>
  </section>

  <section class="controls">
    <input
      type="text"
      id="searchInput"
      class="search-box"
      placeholder="नाव, मतदारसंघ किंवा पक्ष शोधा..."
    />

    <select id="partyFilter" class="filter-box">
      <option value="all">सर्व पक्ष</option>
      <option value="BJP">BJP</option>
      <option value="INC">INC</option>
      <option value="Shiv Sena">Shiv Sena</option>
      <option value="NCP">NCP</option>
      <option value="IND">IND</option>
    </select>
  </section>

  <section class="cards-wrap" id="cardsContainer"></section>

  <div class="empty-message" id="emptyMessage">
    कोणतीही प्रोफाइल सापडली नाही.
  </div>

  <footer class="footer">
    <div class="footer-left">
      <span>🏛</span>
      <span>जनसेवा प्रोफाइल्स</span>
    </div>

    <div>© २०२५ जनसेवा प्रोफाइल्स प्लॅटफॉर्म. सर्व हक्क राखीव.</div>

    <div class="footer-icons">
      <span>Ⓕ</span>
      <span>@</span>
    </div>
  </footer>

      },
      {

      {

      {

      },
      {
        name: "Mangesh Chavan",
        constituency: "Chalisgaon",
        party: "BJP",
        desc: "Youth development and infrastructure growth.",
        tags: ["🏫 Schools", "🧑 Youth", "🚧 Roads"],
        avatar: "https://randomuser.me/api/portraits/men/36.pg"
      },
      {
        name: "Kishor Patil",
        constituency: "Pachora",
        party: "Shiv Sena",
        desc: "Regional development with focus on agriculture.",
        tags: ["🌾 Farming", "🚧 Roads", "💧 Water"],
        avatar: "https://randomuser.me/api/portraits/men/65.pg"
      },
      {
        name: "Girish Mahajan",
        constituency: "Jamner",
        party: "BJP",
        desc: "Strong governance, infrastructure, and water management.",
        tags: ["💧 Water", "🌾 Irrigation", "🚧 Roads"],
        avatar: "https://randomuser.me/api/portraits/men/46.pg"
      },
      {
        name: "Chandrakant Patil",
        constituency: "Muktainagar",
        party: "BJP",
        desc: "Policy-driven governance and economic development.",
        tags: ["🏫 Education", "🏙️ Urban", "🚧 Roads"],
        avatar: "https://randomuser.me/api/portraits/men/70.pg"
      }
    ];

    const cardsContainer = document.getElementById("cardsContainer");
    const searchInput = document.getElementById("searchInput");
    const partyFilter = document.getElementById("partyFilter");
    const emptyMessage = document.getElementById("emptyMessage");

    function createCard(person) {
      return `
        <div class="profile-card">
          <div class="card-top">
            <div class="avatar">
              <img src="${person.avatar}" alt="${person.name}">
            </div>
          </div>

          <div class="card-body">
            <div class="verify">✓</div>
            <h3 class="name">${person.name}</h3>
            <div class="designation">आमदार, ${person.constituency}</div>
            <div class="party">${person.party}</div>
            <p class="desc">${person.desc}</p>

            <div class="tags">
              ${person.tags.map(tag => `<span class="tag">${tag}</span>`).join("")}
            </div>
          </div>

          <div class="card-footer">
            <a href="#">पूर्ण प्रोफाइल पहा →</a>
          </div>
        </div>
      `;
    }

    function renderCards() {
      const searchValue = searchInput.value.toLowerCase().trim();
      const selectedParty = partyFilter.value;

      const filteredProfiles = profiles.filter(person => {
        const matchesSearch =
          person.name.toLowerCase().includes(searchValue) ||
          person.constituency.toLowerCase().includes(searchValue) ||
          person.party.toLowerCase().includes(searchValue);

        const matchesParty =
          selectedParty === "all" || person.party === selectedParty;

        return matchesSearch && matchesParty;
      });

      if (filteredProfiles.length === 0) {
        cardsContainer.innerHTML = "";
        emptyMessage.style.display = "block";
      } else {
        cardsContainer.innerHTML = filteredProfiles.map(createCard).join("");
        emptyMessage.style.display = "none";
      }
    }

    searchInput.addEventListener("input", renderCards);
    partyFilter.addEventListener("change", renderCards);

    renderCards();
  </script>
</body>
</html>
